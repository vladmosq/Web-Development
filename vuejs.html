<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app">
        <h1>{{ message }}!</h1>
        <button @click="change_Message()">Change My Message!</button>
    </div>
</body>

<script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                message : "Greetings from Vue",
            },
            methods: {
                change_Message: function() {
                    this.message = "Greetings from Vue again!";
                },
            },
            watch: {
                message: function () {
                    console.log(this.message)
                },
            },
        });
    </script>


</html>
